spring:
  application:
    name: api-gateway
  cloud:
    webflux:
      gateway:
        routes:
          - id: course-service-route
            uri: lb://COURSE-SERVICE
            predicates:
              - Path=/identity/**

          - id: student-service-route
            uri: lb://STUDENT
            predicates:
              - Path=/users/**

server:
  port: 8080

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true