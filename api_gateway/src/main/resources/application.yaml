spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: course-service-route
              uri: lb://COURSE-SERVICE
              predicates:
                - Path=/api/courses/**

            - id: student-service-route
              uri: lb://STUDENT
              predicates:
                - Path=/api/students/**

server:
  port: 8080

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true